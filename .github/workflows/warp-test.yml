name: warp-test

# DIAGNOSTIC: does FREE Cloudflare WARP defeat YouTube's datacenter bot-wall on
# a GitHub runner? Robust version — every command is best-effort and the verdict
# is ALWAYS written to .social/warp-test-result.txt so we can read WHY it failed.
# Trigger: push .social/warp-test, or run manually.

on:
  push:
    branches: [main]
    paths:
      - ".social/warp-test"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: warp-test
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      YT_COOKIES: ${{ secrets.YT_COOKIES }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run WARP test (never aborts; writes full log)
        shell: bash
        run: |
          set +e
          mkdir -p build .social
          R=".social/warp-test-result.txt"
          : > "$R"
          log(){ echo "$@" | tee -a "$R"; }

          log "warp-test @ $(date -u +%FT%TZ)"
          log "raw egress: $(curl -s --max-time 15 https://www.cloudflare.com/cdn-cgi/trace/ | grep -E 'ip=|warp=' | tr '\n' ' ')"

          log "---- install tools ----"
          sudo apt-get update -qq
          # install SEPARATELY so one bad package can't sink the others (v1 bug:
          # bundling openresolv failed the whole apt call -> no wg-quick/ffmpeg)
          sudo apt-get install -y -qq wireguard-tools 2>&1 | tail -1 | tee -a "$R"
          sudo apt-get install -y -qq resolvconf 2>&1 | tail -1
          sudo apt-get install -y -qq ffmpeg 2>&1 | tail -1
          log "wg-quick: $(command -v wg-quick || echo MISSING)"
          WGCF_VER=2.2.22
          curl -sL -o wgcf "https://github.com/ViRb3/wgcf/releases/download/v${WGCF_VER}/wgcf_${WGCF_VER}_linux_amd64"
          chmod +x wgcf && sudo mv wgcf /usr/local/bin/wgcf
          log "wgcf: $(wgcf --version 2>&1 | head -1)"
          python -m pip install -U yt-dlp >/dev/null 2>&1
          log "yt-dlp: $(yt-dlp --version 2>&1); ffmpeg: $(command -v ffmpeg || echo MISSING)"

          log "---- bring up Cloudflare WARP ----"
          sudo modprobe wireguard 2>&1 | tee -a "$R"
          log "wireguard module: $(lsmod | grep -c wireguard) (1=loaded)"
          wgcf register --accept-tos 2>&1 | tail -2 | tee -a "$R"
          wgcf generate 2>&1 | tail -2 | tee -a "$R"
          log "profile written: $([ -f wgcf-profile.conf ] && echo yes || echo NO)"
          sudo mkdir -p /etc/wireguard
          sudo cp wgcf-profile.conf /etc/wireguard/warp.conf 2>/dev/null
          sudo sed -i '/^DNS/d' /etc/wireguard/warp.conf 2>/dev/null
          sudo wg-quick up warp 2>&1 | tail -4 | tee -a "$R"
          sleep 3
          WARP_TRACE=$(curl -s --max-time 15 https://www.cloudflare.com/cdn-cgi/trace/ | grep -E 'ip=|warp=' | tr '\n' ' ')
          log "warp egress: $WARP_TRACE"
          echo "$WARP_TRACE" | grep -q "warp=on" && log "WARP ACTIVE ✅" || log "WARP NOT ACTIVE ❌ (egress still raw)"

          [ -n "$YT_COOKIES" ] && printf '%s' "$YT_COOKIES" > build/yt_cookies.txt
          log "cookies: $([ -s build/yt_cookies.txt ] && echo yes || echo no)"

          log "---- the exact download that was bot-walled before ----"
          STORY="2z8sHRNhuHc"
          for MODE in warp+cookies warp-only; do
            rm -f build/w-* 2>/dev/null
            ARGS=""
            if [ "$MODE" = "warp+cookies" ] && [ -s build/yt_cookies.txt ]; then ARGS="--cookies build/yt_cookies.txt"; fi
            OUT=$(yt-dlp $ARGS --no-playlist --no-warnings \
                  -f "bv*[height<=720]/b[height<=720]/b" \
                  --download-sections "*00:00:10-00:00:20" \
                  -o "build/w-%(id)s.%(ext)s" \
                  "https://www.youtube.com/watch?v=$STORY" 2>&1)
            F=$(ls build/w-* 2>/dev/null | head -1)
            if [ -n "$F" ]; then
              log "[$MODE] SUCCESS -> $(wc -c < "$F") bytes  ***FOOTAGE UNLOCKED***"
            else
              log "[$MODE] fail: $(echo "$OUT" | grep -iE 'bot|sign in|unavailable|error|forbidden|no such|wireguard' | head -1 | cut -c1-110)"
            fi
          done
          log "---- done ----"
          exit 0

      - name: Commit result
        if: always()
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .social/warp-test-result.txt 2>/dev/null || true
          git commit -m "warp-test: result [skip ci]" || echo "nothing to commit"
          for i in 1 2 3 4; do
            git pull --rebase --autostash origin main && git push && break
            sleep $((RANDOM % 3 + 2))
          done
