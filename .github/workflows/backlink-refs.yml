name: GenZHype backlink refs (Stage 2)
on:
  schedule:
    - cron: '0 4 1 * *'
  workflow_dispatch:
jobs:
  refs:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run backlink refs miner
        env:
          BACKLINK_BASE: 'https://genzhype.com'
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          COMPETITORS: ${{ vars.COMPETITORS }}
        run: python backlink_refs.py
