name: cookie-check

# Fast (~1-2 min) DIAGNOSTIC — does the YT_COOKIES secret actually authenticate
# yt-dlp against YouTube? Writes the cookie exactly like the video-maker does,
# runs a --simulate (no download) on one public video, and commits the verdict
# to .social/cookie-check-result.txt so the maintainer can read it from the
# server (git pull) WITHOUT needing GitHub Actions log access. Triggered by a
# push touching the sentinel .social/cookie-check, or manually.

on:
  push:
    branches: [main]
    paths:
      - ".social/cookie-check"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cookie-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      YT_COOKIES: ${{ secrets.YT_COOKIES }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp + ffmpeg
        run: |
          python -m pip install -U yt-dlp
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Test the cookie
        run: |
          mkdir -p build .social
          RESULT=".social/cookie-check-result.txt"
          {
            echo "cookie-check @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            if [ -z "$YT_COOKIES" ]; then
              echo "SECRET: EMPTY — YT_COOKIES is not set (or blank). This is why"
              echo "        ck_mode is off and footage-first never activates."
            else
              printf '%s' "$YT_COOKIES" > build/yt_cookies.txt
              BYTES=$(wc -c < build/yt_cookies.txt)
              LINES=$(wc -l < build/yt_cookies.txt)
              echo "SECRET: present — $BYTES bytes, $LINES lines"
              echo "GATE  : maker needs >100 bytes -> $([ "$BYTES" -gt 100 ] && echo PASS || echo FAIL)"
              # does it look like a Netscape cookies.txt with youtube auth cookies?
              if grep -qiE "youtube\.com" build/yt_cookies.txt; then
                echo "DOMAIN: youtube.com cookies present"
              else
                echo "DOMAIN: NO youtube.com lines — wrong export? (needs cookies from youtube.com)"
              fi
              for C in SID HSID SSID APISID SAPISID __Secure-1PSID LOGIN_INFO; do
                grep -qiE "[[:space:]]$C[[:space:]]" build/yt_cookies.txt \
                  && echo "AUTH  : $C found" || true
              done
              echo "ffmpeg: $(command -v ffmpeg || echo MISSING)"
              echo "yt-dlp: $(yt-dlp --version)"
              # Find a player_client that DEFEATS the datacenter bot-wall on a
              # real story video (the maker only tries web + android — both
              # walled). Whichever produces a real file section is the fix.
              STORY="2z8sHRNhuHc"
              try_client () {
                local ARGS="$1" LABEL="$2"
                rm -f build/c-*.mp4 build/c-*.webm build/c-*.mkv 2>/dev/null
                set +e
                OUT=$(yt-dlp --cookies build/yt_cookies.txt --no-playlist \
                      --no-warnings $ARGS \
                      -f "bv*[height<=720]/b[height<=720]/b" \
                      --download-sections "*00:00:10-00:00:20" \
                      -o "build/c-%(id)s.%(ext)s" \
                      "https://www.youtube.com/watch?v=$STORY" 2>&1)
                local EX=$?; set -e
                local F=$(ls build/c-* 2>/dev/null | head -1)
                if [ -n "$F" ]; then
                  echo "  [$LABEL] SUCCESS -> $(basename "$F") $(wc -c < "$F") bytes"
                else
                  echo "  [$LABEL] fail: $(echo "$OUT" | grep -iE 'bot|sign in|unavailable|private|error|no video|drm' | head -1 | cut -c1-90)"
                fi
              }
              echo "---- player_client bypass test on story $STORY ----"
              try_client ""                                              "default(web)"
              try_client "--extractor-args youtube:player_client=android" "android"
              try_client "--extractor-args youtube:player_client=ios"     "ios"
              try_client "--extractor-args youtube:player_client=tv"      "tv"
              try_client "--extractor-args youtube:player_client=mweb"    "mweb"
              try_client "--extractor-args youtube:player_client=web_safari" "web_safari"
              try_client "--extractor-args youtube:player_client=web_embedded" "web_embedded"
              try_client "--extractor-args youtube:player_client=tv_embedded"  "tv_embedded"
            fi
          } | tee "$RESULT"

      - name: Commit result
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .social/cookie-check-result.txt || true
          git commit -m "cookie-check: result [skip ci]" || echo "no change"
          git push || true
