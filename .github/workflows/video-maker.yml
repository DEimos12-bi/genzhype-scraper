name: video-maker

# v3: renders one GenZHype short (9:16, photo scenes alternating with REAL
# stock b-roll, modern edge-tts narration + word-by-word captions, Gemini
# vision judge) per fresh page and POSTs it back to genzhype.com.
# Same token-gated feed + .social dedup pattern as the other posters.
#
# OPTIONAL secrets (every one may be absent — the driver degrades gracefully):
#   PEXELS_API_KEY / PIXABAY_API_KEY  -> real b-roll video scenes (free keys
#                                        from pexels.com/api, pixabay.com/api);
#                                        missing -> photos-only (v2 behaviour)
#   GEMINI_API_KEY                    -> vision judge on the finished mp4 AND
#                                        (v5) vision re-rank of stock b-roll
#                                        candidates against the narration
#                                        phrase (max ~8 calls/video, cached
#                                        per query); missing -> judge skipped
#                                        + first-candidate stock (v4.5)
#   YT_COOKIES                        -> (r24 FOOTAGE-FIRST) cookies.txt of a
#                                        logged-in secondary YouTube account;
#                                        with it yt-dlp survives the bot wall
#                                        and REAL FOOTAGE carries the video
#                                        (multi-window sections, budgets flip
#                                        to 8 scenes / min(30s, 60% runtime));
#                                        missing -> exact modest r13/r17
#                                        stills-first behavior
#
# QUOTA LEVER: set env VIDEO_VISION_RERANK: "0" below to disable ONLY the
# stock re-rank (keeps the judge) when the shared Gemini free tier runs hot.

on:
  schedule:
    - cron: "17 */6 * * *"      # every 6 hours
  # On-demand render trigger: a push that touches the sentinel file
  # .social/render-trigger starts a run. Lets the maintainer kick a test
  # render straight from the server (git push) without the Actions UI. The
  # end-of-run dedup commit only touches .social/video_done.txt (+ [skip ci]),
  # so a run never re-triggers itself.
  push:
    branches: [main]
    paths:
      - ".social/render-trigger"
  workflow_dispatch:
    inputs:
      batch:
        description: "How many videos to make this run"
        required: false
        default: "1"

concurrency:
  group: video-maker
  cancel-in-progress: false

permissions:
  contents: write                # to commit .social/video_done.txt

jobs:
  make:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
      VIDEO_BATCH: ${{ github.event.inputs.batch || '1' }}
      VIDEO_WORKDIR: build
      VIDEO_STATE_FILE: .social/video_done.txt
      # r25: YouTube bot-walls video downloads from CI IPs (all clients fail
      # even with valid cookies). Skip the doomed yt-dlp spawns (fast renders)
      # while keeping cookie/footage MODE on so the mismatched-stock kill stays
      # active and the video rides motion-strong real stills. Set to "1" only
      # r28: FOOTAGE IS BACK ON — Cloudflare WARP (set up below) + cookies beat
      # YouTube's bot-wall (proven). yt-dlp fetches real story clips again, so
      # the r24 footage-first engine goes live. If WARP/cookies ever fail, the
      # driver degrades to motion-lite stills automatically.
      VIDEO_FOOTAGE_FETCH: "1"
      # r25: motion-lite lean pipeline — skip the heavy/fragile ML niceties that
      # were hanging the runner (CLIP verify + whisperx forced-align). edge-tts
      # timings sync captions fine; there is no footage to CLIP-verify.
      VIDEO_CLIP_VERIFY: "0"
      VIDEO_FORCED_ALIGN: "0"
      # Point the driver at the vendored Turbo tree so it reuses voice.py.
      MPT_HOME: ${{ github.workspace }}/videorepos/mpt
      # v3 OPTIONAL keys — unset secrets expand to "" and the driver treats
      # empty as disabled, so no step ever fails when these are absent.
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # r24: logged-in YouTube cookies.txt (secondary account). Written to a
      # FILE by the step below — the driver only ever reads the file, and
      # GitHub masks the secret in any accidental log output anyway.
      YT_COOKIES: ${{ secrets.YT_COOKIES }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify ffmpeg + fonts (preinstalled on ubuntu-latest)
        # Resolve the runner's REAL ffmpeg path dynamically — hardcoding /usr/bin/ffmpeg
        # broke run #1 (current runners ship it elsewhere). moviepy + the faststart
        # remux both honor IMAGEIO_FFMPEG_EXE; if ffmpeg were ever missing entirely,
        # the pip-installed imageio-ffmpeg bundles its own binary as the fallback.
        run: |
          FF="$(command -v ffmpeg || true)"
          if [ -n "$FF" ]; then
            echo "IMAGEIO_FFMPEG_EXE=$FF" >> "$GITHUB_ENV"
            echo "ffmpeg at: $FF"
            "$FF" -hide_banner -encoders | grep -E "libx264|aac " || true
          else
            echo "no system ffmpeg; installing via apt (pydub needs ffprobe for the sound mix)"
            sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg || true
            FF="$(command -v ffmpeg || true)"
            [ -n "$FF" ] && echo "IMAGEIO_FFMPEG_EXE=$FF" >> "$GITHUB_ENV" || true
          fi
          fc-list | grep -iE "dejavu|liberation" | head || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal render deps
        # Minimal real subset of Turbo's requirements needed for a headless,
        # single-image render. moviepy pulls numpy/Pillow/imageio automatically;
        # we pin them explicitly for reproducibility. edge_tts = TTS + word
        # boundaries. pydub kept for parity with Turbo's voice.py (lazy import).
        # opencv-python-headless (v6) = haarcascade face detection for the
        # face-aware phone framing; if it ever fails to import, the driver
        # silently falls back to center crops (never fatal).
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "moviepy==2.2.1" \
            "edge-tts==7.2.7" \
            "pydub==0.25.1" \
            "Pillow>=10.3" \
            "numpy>=1.26" \
            "requests>=2.31" \
            "imageio-ffmpeg>=0.5" \
            "curl_cffi>=0.7" \
            "opencv-python-headless>=4.9,<5"

      # r14 CLIP VERIFYING EYE (optional, quota-free): sentence-transformers
      # CLIP ViT-B-32 scores each photo scene's image against the words
      # spoken over it and swaps clear mismatches to a better pool image —
      # all on the runner CPU, zero API quota. The ~605MB model downloads at
      # first use inside the render step; the driver tolerates a failed
      # install/download by skipping the check entirely, so this step is
      # non-fatal. Kill switch: env VIDEO_CLIP_VERIFY: "0".
      # r25: ML stack (torch + sentence-transformers + whisperx, ~1GB) DISABLED.
      # It powered CLIP-verify (matches a photo to the words) and whisperx
      # forced-alignment (precise caption sync) — both quality niceties. In
      # motion-lite mode there is no footage to CLIP-verify, and edge-tts's own
      # word timings sync captions fine. Downloading ~1GB of models on the
      # runner was HANGING the job (runs #105/#106 timed out at 30min). Cutting
      # it makes renders lean and reliable; VIDEO_CLIP_VERIFY/FORCED_ALIGN=0 in
      # env keep the driver from even trying to load them. Re-add if footage
      # ever comes back (e.g. via a residential proxy).
      - name: ML stack disabled (motion-lite — lean + reliable)
        run: echo "CLIP + whisperx skipped (VIDEO_CLIP_VERIFY=0, VIDEO_FORCED_ALIGN=0)"

      # r18 GRAFT A FORCED ALIGNMENT (optional): whisperx measures the REAL
      # word timings from the rendered audio (edge-tts's self-reported cues +
      # r12 concat offsets are what make the narration read LATE). CPU-only
      # torch (no CUDA bloat); the ~360MB wav2vec2 align model downloads at
      # first use inside the render step. The driver treats a failed install
      # OR a failed model download as "keep edge timings", so this step is
      # non-fatal. Kill switch: env VIDEO_FORCED_ALIGN: "0".


      # r13/r24 REAL FOOTAGE (optional): yt-dlp fetches short MUTED sections
      # of the story's own YouTube videos. Cookie-less: the modest r13/r17
      # budgets (<=3.5s shown per scene, max ~8-12 borrowed seconds — the
      # drama-channel fair-use posture) and YouTube frequently bot-walls the
      # runner IP anyway. WITH the YT_COOKIES file (r24 FOOTAGE-FIRST) the
      # downloads actually succeed and footage carries the video: up to 3
      # DIFFERENT windows per id, 8 footage scenes, min(30s, 60% of runtime)
      # borrowed, throttled to 12 yt-dlp attempts/run with 2-4s sleeps
      # (burner-account safety). The driver falls back to the thumbnail
      # still on every miss, so this step and the feature are both
      # non-fatal. Kill switch: VIDEO_REAL_FOOTAGE=0.
      # Unpinned on purpose: YouTube breaks old yt-dlp versions constantly.
      - name: Install yt-dlp for real story footage (optional)
        continue-on-error: true
        run: |
          python -m pip install yt-dlp

      # r28 FOOTAGE UNLOCK (proven by warp-test: warp+cookies downloaded a
      # previously bot-walled story video). Route the runner's egress through
      # FREE Cloudflare WARP so YouTube stops bot-walling the datacenter IP.
      # Combined with the YT_COOKIES secret, yt-dlp footage fetches now succeed.
      # Non-fatal: if WARP won't come up, footage degrades to the cookie-less
      # bot-wall (motion-lite stills) — the render never breaks.
      - name: Route egress through Cloudflare WARP (footage unlock)
        continue-on-error: true
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard-tools || true
          sudo apt-get install -y -qq resolvconf || true
          WGCF_VER=2.2.22
          curl -sL -o /tmp/wgcf "https://github.com/ViRb3/wgcf/releases/download/v${WGCF_VER}/wgcf_${WGCF_VER}_linux_amd64" \
            && chmod +x /tmp/wgcf && sudo mv /tmp/wgcf /usr/local/bin/wgcf
          sudo modprobe wireguard || true
          wgcf register --accept-tos || true
          wgcf generate || true
          sudo mkdir -p /etc/wireguard
          sudo cp wgcf-profile.conf /etc/wireguard/warp.conf || true
          sudo sed -i '/^DNS/d' /etc/wireguard/warp.conf || true
          sudo wg-quick up warp && echo "WARP up — footage egress via Cloudflare" \
            || echo "WARP failed to start; footage will bot-wall (stills fallback)"

      # r24 FOOTAGE-FIRST: write the logged-in cookies.txt where the driver
      # looks for it (<VIDEO_WORKDIR>/yt_cookies.txt). printf to a file only
      # — the secret value is NEVER echoed to the log (and GitHub masks it
      # regardless). Absent/empty secret -> no file -> the driver keeps the
      # exact cookie-less stills-first behavior. Non-fatal by construction.
      - name: Write YouTube cookies file (optional)
        continue-on-error: true
        run: |
          mkdir -p "$VIDEO_WORKDIR"
          if [ -n "$YT_COOKIES" ]; then
            printf '%s' "$YT_COOKIES" > "$VIDEO_WORKDIR/yt_cookies.txt"
            chmod 600 "$VIDEO_WORKDIR/yt_cookies.txt"
            echo "cookies file written ($(wc -c < "$VIDEO_WORKDIR/yt_cookies.txt") bytes)"
          else
            echo "YT_COOKIES not set; footage runs cookie-less (stills-first mode)"
          fi

      # OPTIONAL: extra deps so the driver imports and reuses Turbo's REAL
      # app.services.voice (its top-level imports need loguru/toml/openai).
      # Non-fatal: if this fails, video_maker.py falls back to its faithful
      # in-file edge-tts port, so the render still succeeds.
      - name: Enable real Turbo voice reuse (optional)
        continue-on-error: true
        run: |
          python -m pip install "loguru==0.7.3" "toml>=0.10" "openai==2.24.0"

      # v10 REAL-SOURCE SCREENSHOTS (optional): chromium to screenshot the
      # actual article pages as evidence ("original pixels"). Non-fatal —
      # missing browser just means the rendered cards are used instead.
      - name: Install chromium for real-source screenshots (optional)
        continue-on-error: true
        timeout-minutes: 6          # r25: fail fast if the download hangs (was a
                                    # silent 30-min hang risk) — screenshots are
                                    # optional, cards render without them
        run: |
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      # The driver imports Turbo's app.services.voice from MPT_HOME when present.
      # It ALSO has a self-contained edge-tts fallback, so this step is optional:
      # if videorepos/mpt is not vendored in the repo, the run still succeeds.
      - name: Report Turbo tree availability
        run: |
          if [ -d "$MPT_HOME/app/services" ]; then
            echo "Turbo voice module present at $MPT_HOME (will be reused)"
          else
            echo "Turbo tree not vendored; driver uses its in-file edge-tts fallback"
          fi

      - name: Render + post video(s)
        timeout-minutes: 16         # r25: a render that hasn't posted in 16min
                                    # is hung — fail the step fast instead of
                                    # eating the whole 30min job (runs #105/#106)
        run: python video_maker.py

      - name: Commit dedup state
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # r16: the replan book (.social/video_replans.txt) commits alongside
          # the done-list; the || true guards keep an absent file from ever
          # failing this step.
          if [ -n "$(git status --porcelain .social/video_done.txt .social/video_replans.txt 2>/dev/null || true)" ]; then
            git add .social/video_done.txt || true
            git add .social/video_replans.txt || true
            git commit -m "video-maker: update dedup state [skip ci]"
            # r25: the on-demand render trigger means the maintainer may push to
            # main WHILE a render runs, so main can advance under us -> the plain
            # push was rejected (non-fast-forward) and turned the whole run red
            # even though the video delivered fine. Rebase + retry a few times so
            # this bookkeeping commit never fails the run.
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin main && git push && break
              echo "push race (attempt $i); retrying"; sleep $((RANDOM % 4 + 2))
            done
          else
            echo "no dedup changes to commit"
          fi
