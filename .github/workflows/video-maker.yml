name: video-maker

# Renders one GenZHype hero-image short (9:16, Ken-Burns + edge-tts narration +
# word-by-word captions) per fresh page and POSTs it back to genzhype.com.
# Same token-gated feed + .social dedup pattern as the other posters.

on:
  schedule:
    - cron: "17 */6 * * *"      # every 6 hours
  workflow_dispatch:
    inputs:
      batch:
        description: "How many videos to make this run"
        required: false
        default: "1"

concurrency:
  group: video-maker
  cancel-in-progress: false

permissions:
  contents: write                # to commit .social/video_done.txt

jobs:
  make:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
      VIDEO_BATCH: ${{ github.event.inputs.batch || '1' }}
      VIDEO_WORKDIR: build
      VIDEO_STATE_FILE: .social/video_done.txt
      # Use the runner's preinstalled ffmpeg (has libx264 + aac) instead of the
      # imageio-ffmpeg download; both moviepy and our faststart remux honor this.
      IMAGEIO_FFMPEG_EXE: /usr/bin/ffmpeg
      # Point the driver at the vendored Turbo tree so it reuses voice.py.
      MPT_HOME: ${{ github.workspace }}/videorepos/mpt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify ffmpeg + fonts (preinstalled on ubuntu-latest)
        run: |
          ffmpeg -hide_banner -encoders | grep -E "libx264|aac " || true
          fc-list | grep -iE "dejavu|liberation" | head || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal render deps
        # Minimal real subset of Turbo's requirements needed for a headless,
        # single-image render. moviepy pulls numpy/Pillow/imageio automatically;
        # we pin them explicitly for reproducibility. edge_tts = TTS + word
        # boundaries. pydub kept for parity with Turbo's voice.py (lazy import).
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "moviepy==2.2.1" \
            "edge-tts==7.2.7" \
            "pydub==0.25.1" \
            "Pillow>=10.3" \
            "numpy>=1.26" \
            "requests>=2.31" \
            "imageio-ffmpeg>=0.5"

      # OPTIONAL: extra deps so the driver imports and reuses Turbo's REAL
      # app.services.voice (its top-level imports need loguru/toml/openai).
      # Non-fatal: if this fails, video_maker.py falls back to its faithful
      # in-file edge-tts port, so the render still succeeds.
      - name: Enable real Turbo voice reuse (optional)
        continue-on-error: true
        run: |
          python -m pip install "loguru==0.7.3" "toml>=0.10" "openai==2.24.0"

      # The driver imports Turbo's app.services.voice from MPT_HOME when present.
      # It ALSO has a self-contained edge-tts fallback, so this step is optional:
      # if videorepos/mpt is not vendored in the repo, the run still succeeds.
      - name: Report Turbo tree availability
        run: |
          if [ -d "$MPT_HOME/app/services" ]; then
            echo "Turbo voice module present at $MPT_HOME (will be reused)"
          else
            echo "Turbo tree not vendored; driver uses its in-file edge-tts fallback"
          fi

      - name: Render + post video(s)
        run: python video_maker.py

      - name: Commit dedup state
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain .social/video_done.txt)" ]; then
            git add .social/video_done.txt
            git commit -m "video-maker: update dedup state [skip ci]"
            git push
          else
            echo "no dedup changes to commit"
          fi
